<!DOCTYPE html>
<html>
<head>
    <title>Tree Health Dashboard MVP</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        body { margin:0; padding:0; font-family:Arial, sans-serif; }
        #map { position:absolute; top:0; bottom:0; width:100%; }

        .legend {
            background: white;
            padding: 10px;
            border-radius: 4px;
            line-height: 20px;
        }
        .legend i {
            width: 18px;
            height: 18px;
            float: left;
            margin-right: 8px;
            opacity: 0.8;
        }

        .stats-panel {
            position: absolute;
            top: 80px;
            left: 10px;
            background: white;
            padding: 12px;
            border-radius: 4px;
            z-index: 1000;
            min-width: 180px;
            box-shadow: 0 1px 5px rgba(0,0,0,0.4);
            pointer-events: auto;
        }
        .stats-panel h4 { margin: 0 0 8px 0; }
        .stats-panel p { margin: 4px 0; font-size:13px; }

        .disclaimer {
            position: absolute;
            bottom: 10px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(255,255,255,0.9);
            padding: 8px 12px;
            border-radius: 4px;
            z-index: 1000;
            font-size: 12px;
            max-width: 600px;
            text-align: center;
        }
    </style>
</head>
<body>

<div id="map"></div>

<div class="stats-panel">
    <h4>Dashboard Stats</h4>
    <p id="trees">Trees: Loading...</p>
    <p id="points">Field Points: Loading...</p>
    <p id="contours">Contours: Loading...</p>
</div>

<div class="disclaimer">
    This dashboard supports exploratory analysis. The data may not show strong or conclusive relationships between canopy health and sap production.
</div>

<script>
/*
==========================================================
 PSEUDOCODE / HOW THIS DASHBOARD WORKS (plain language)
==========================================================

1. LOAD MAP
   - Create a Leaflet map centred on the study area.
   - Add an OpenStreetMap base layer for geographic context.

2. LOAD LAYERS
   - For each GeoJSON file (tree polygons, field points, contour lines):
     a. Fetch the file from the data/ folder.
     b. Parse the GeoJSON features.
     c. Add them to the map as a styled layer.
     d. Register the layer in the layer-control panel so the
        user can toggle it on/off.

3. STYLE LAYERS
   - Tree polygons are coloured by their stress category
     (Green = healthy … Red = high stress).
   - Field/sap points are coloured by their MAJORITY class code
     using the same colour palette, with a larger radius so they
     are easy to see.
   - Contour lines are thin grey lines with no fill.

4. SHOW POPUPS
   - When a user clicks a tree polygon or field point, a popup
     appears showing human-readable labels:
       • Tree Condition or Tree Classification (e.g. "Healthy (Green)")
       • The raw class code for reference
       • Area, confidence, or other relevant fields.

5. SHOW STATS
   - A small panel in the top-left shows live counts of how many
     tree polygons, field points, and contour features are loaded.
==========================================================
*/

// ── 1. Initialize map ──────────────────────────────────
const map = L.map('map').setView([45.1, -64.5], 16);

// Base layer – CartoDB Voyager (OpenStreetMap-based, no access restrictions)
L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
    maxZoom: 20,
    attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors &copy; <a href="https://carto.com/">CARTO</a>',
    subdomains: 'abcd'
}).addTo(map);

// Layer control (overlays only, collapsed so it doesn't crowd the map)
const layerControl = L.control.layers({}, {}, {collapsed: false}).addTo(map);

// ── Stats counters ─────────────────────────────────────
let treeCount = 0;
let pointCount = 0;
let contourCount = 0;

// ── 2. Colour & label mappings ─────────────────────────

// Stress-category display colours
const stressColors = {
    'Green':  '#2ecc71',
    'Yellow': '#f1c40f',
    'Orange': '#e67e22',
    'Red':    '#e74c3c',
    'NoLeaf': '#3498db'
};

// MAJORITY class-code → human-readable label + colour key
const classLabels = {
    1: { label: 'High Stress',     colour: 'Red'    },
    2: { label: 'Moderate Stress',  colour: 'Orange' },
    3: { label: 'Mild Stress',      colour: 'Yellow' },
    5: { label: 'Leafless',         colour: 'NoLeaf' },
    6: { label: 'Healthy',          colour: 'Green'  }
};

/** Return a friendly string like "Healthy (Green)" for a MAJORITY code. */
function classDescription(code) {
    const info = classLabels[code];
    if (!info) return 'Unknown (' + code + ')';
    return info.label + ' (' + info.colour + ')';
}

/** Return a fill colour for a MAJORITY code. */
function classColor(code) {
    const info = classLabels[code];
    if (!info) return '#999';
    return stressColors[info.colour] || '#999';
}

// ── 3. Legend ───────────────────────────────────────────
const legend = L.control({position: 'bottomleft'});
legend.onAdd = function () {
    const div = L.DomUtil.create('div', 'legend');
    div.innerHTML += '<b>Leaf Stress</b><br>';
    for (const [label, color] of Object.entries(stressColors)) {
        div.innerHTML += '<i style="background:' + color + '"></i> ' + label + '<br>';
    }
    return div;
};
legend.addTo(map);

// ── 4. Popup builders ──────────────────────────────────

function treePopup(feature) {
    const p = feature.properties;
    const code = p.MAJORITY;
    return '<b>Tree Polygon</b><br>' +
        'Tree Condition: ' + classDescription(code) + '<br>' +
        'Class Code: ' + (code != null ? code : 'N/A') + '<br>' +
        'Confidence: ' + (p.Confidence != null ? p.Confidence.toFixed(1) + '%' : 'N/A') + '<br>' +
        'Area: ' + (p.Shape_Area != null ? p.Shape_Area.toFixed(2) + ' m²' : 'N/A') + '<br>' +
        'Perimeter: ' + (p.Shape_Leng != null ? p.Shape_Leng.toFixed(2) + ' m' : 'N/A');
}

function pointPopup(feature) {
    const p = feature.properties;
    const code = p.MAJORITY;
    return '<b>Field Point: ' + (p.Point_ID || 'N/A') + '</b><br>' +
        'Tree Classification: ' + classDescription(code) + '<br>' +
        'Class Code: ' + (code != null ? code : 'N/A') + '<br>' +
        'Ortho Height: ' + (p.Ortho != null ? p.Ortho.toFixed(1) + ' m' : 'N/A') + '<br>' +
        'X: ' + (p.X != null ? p.X.toFixed(1) : 'N/A') + '<br>' +
        'Y: ' + (p.Y != null ? p.Y.toFixed(1) : 'N/A');
}

function contourPopup(feature) {
    return '<b>Contour Line</b><br>Elevation: ' + feature.properties.Contour + ' m';
}

// ── 5. GeoJSON loader ──────────────────────────────────

async function loadGeoJSON(path, name, style, popupFn) {
    try {
        const res = await fetch(path);
        const data = await res.json();

        const isPointLayer = name.includes('Point');

        const layer = L.geoJSON(data, {
            // Polygon / line style – ensure interactive so clicks work
            style: function (feature) {
                return Object.assign({}, style, { interactive: true });
            },
            // Point rendering – colour by MAJORITY, larger radius
            pointToLayer: function (feature, latlng) {
                const maj = feature.properties.MAJORITY;
                return L.circleMarker(latlng, {
                    radius: 8,
                    fillColor: classColor(maj),
                    color: '#000',
                    weight: 2,
                    fillOpacity: 0.9,
                    interactive: true
                });
            },
            onEachFeature: function (feature, layer) {
                layer.bindPopup(popupFn(feature));
            }
        });

        layerControl.addOverlay(layer, name);
        layer.addTo(map);

        // Update counts
        const n = data.features.length;
        if (name.includes('Tree') || name.includes('Healthy') || name.includes('Stress') || name.includes('Leafless')) {
            treeCount += n;
        }
        if (name.includes('Point'))   pointCount   += n;
        if (name.includes('Contour')) contourCount  += n;

        updateStats();

        // Fit map bounds on first meaningful load
        if (treeCount + pointCount + contourCount === n) {
            map.fitBounds(layer.getBounds());
        }

    } catch (e) {
        console.log('Failed to load ' + name + ':', e);
    }
}

function updateStats() {
    document.getElementById('trees').textContent    = 'Trees: '        + treeCount;
    document.getElementById('points').textContent   = 'Field Points: ' + pointCount;
    document.getElementById('contours').textContent = 'Contours: '     + contourCount;
}

// ── 6. Load all layers ─────────────────────────────────
// Tree polygons are loaded first so they sit below points.
// Contours are loaded last with thin styling so they don't block clicks.

// Area 1 – tree polygons
loadGeoJSON('data/GeoJson/Area1/Tree_Segmentation_with_Leaf_Classification_Area1_Green.json',      'Area 1 - Healthy (Green)',   {color: stressColors.Green,  fillColor: stressColors.Green,  weight:1, fillOpacity:0.5}, treePopup);
loadGeoJSON('data/GeoJson/Area1/Tree_Segmentation_with_Leaf_Classification_Area1_Yellow.json',     'Area 1 - Mild Stress',       {color: stressColors.Yellow, fillColor: stressColors.Yellow, weight:1, fillOpacity:0.5}, treePopup);
loadGeoJSON('data/GeoJson/Area1/Tree_Segmentation_with_Leaf_Classification_Area1_Orange.json',     'Area 1 - Moderate Stress',   {color: stressColors.Orange, fillColor: stressColors.Orange, weight:1, fillOpacity:0.5}, treePopup);
loadGeoJSON('data/GeoJson/Area1/Tree_Segmentation_with_Leaf_Classification_Area1_Red.json',        'Area 1 - High Stress',       {color: stressColors.Red,    fillColor: stressColors.Red,    weight:1, fillOpacity:0.5}, treePopup);
loadGeoJSON('data/GeoJson/Area1/Tree_Segmentation_with_Leaf_Classification_Area1_Cyan_NoLeaf.json','Area 1 - Leafless',           {color: stressColors.NoLeaf, fillColor: stressColors.NoLeaf, weight:1, fillOpacity:0.5}, treePopup);

// Area 2 – tree polygons
loadGeoJSON('data/GeoJson/Area2/Tree_Segmentation_with_Leaf_Classification_Area2_Green.json',      'Area 2 - Healthy (Green)',   {color: stressColors.Green,  fillColor: stressColors.Green,  weight:1, fillOpacity:0.5}, treePopup);
loadGeoJSON('data/GeoJson/Area2/Tree_Segmentation_with_Leaf_Classification_Area2_Yellow.json',     'Area 2 - Mild Stress',       {color: stressColors.Yellow, fillColor: stressColors.Yellow, weight:1, fillOpacity:0.5}, treePopup);
loadGeoJSON('data/GeoJson/Area2/Tree_Segmentation_with_Leaf_Classification_Area2_Orange.json',     'Area 2 - Moderate Stress',   {color: stressColors.Orange, fillColor: stressColors.Orange, weight:1, fillOpacity:0.5}, treePopup);
loadGeoJSON('data/GeoJson/Area2/Tree_Segmentation_with_Leaf_Classification_Area2_Red.json',        'Area 2 - High Stress',       {color: stressColors.Red,    fillColor: stressColors.Red,    weight:1, fillOpacity:0.5}, treePopup);
loadGeoJSON('data/GeoJson/Area2/Tree_Segmentation_with_Leaf_Classification_Area2_Cyan_NoLeaf.json','Area 2 - Leafless',           {color: stressColors.NoLeaf, fillColor: stressColors.NoLeaf, weight:1, fillOpacity:0.5}, treePopup);

// Area 2 – field points (loaded after polygons so they render on top)
loadGeoJSON('data/GeoJson/Area2/Points_Area2_All.json', 'Area 2 - Field Points', {fillColor: '#8e44ad'}, pointPopup);

// Contour lines (loaded last, non-interactive to avoid blocking polygon clicks)
loadGeoJSON('data/GeoJson/Area1/Contour_Lines_1M_Area1.json', 'Area 1 - Contours', {color: '#555', weight: 0.5, fill: false, interactive: false}, contourPopup);
loadGeoJSON('data/GeoJson/Area2/Contour_Lines_1M_Area2.json', 'Area 2 - Contours', {color: '#555', weight: 0.5, fill: false, interactive: false}, contourPopup);

</script>
</body>
</html>
