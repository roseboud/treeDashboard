<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hutchinson Acres Tree Dashboard</title>
  <link rel="stylesheet" href="/src/style.css" />
</head>
<body>
  <div id="toolbar">
    <span id="toolbar-title">🌳 Hutchinson Acres</span>
    <span id="stats-panel">Trees: 0 &nbsp;|&nbsp; Points: 0 &nbsp;|&nbsp; Contours: 0</span>
    <div id="toolbar-actions">
      <button id="btn-3d" class="btn btn-secondary">Switch to 3D ▸</button>
      <button id="btn-2d" class="btn btn-secondary" style="display:none">◂ Switch to 2D</button>
    </div>
  </div>
  <div id="map"></div>
  <div id="potree-container"></div>
  <div id="layer-panel">
    <h4 class="panel-header">🗂 Layers</h4>
  </div>
  <div id="raster-panel">
    <h4 class="panel-header">🛰 Raster COGs</h4>
  </div>
  <div id="filter-panel">
    <h4 class="panel-header">Filters</h4>
    <div class="panel-section">
      <strong>Areas</strong>
      <label><input type="checkbox" data-area-filter="1" checked /> Area 1</label>
      <label><input type="checkbox" data-area-filter="2" checked /> Area 2</label>
    </div>
    <div class="panel-section">
      <strong>Stress</strong>
      <label><input type="checkbox" data-stress-filter="Green" checked /> Healthy</label>
      <label><input type="checkbox" data-stress-filter="Yellow" checked /> Mild</label>
      <label><input type="checkbox" data-stress-filter="Orange" checked /> Moderate</label>
      <label><input type="checkbox" data-stress-filter="Red" checked /> High</label>
      <label><input type="checkbox" data-stress-filter="NoLeaf" checked /> Leafless</label>
    </div>
  </div>
  <div id="validation-panel">
    <h4 class="panel-header">Validation</h4>
    <div id="validation-content" class="panel-status">Loading field point comparison...</div>
  </div>
  <div id="popup" class="ol-popup">
    <a id="popup-closer" href="#">✕</a>
    <div id="popup-content"></div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
